<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#6366F1"/>

  <!-- Phone handset (white) -->
  <path d="M9 12.8C9 11.81 9.81 11 10.8 11H12.5L14.2 14.4L12.2 15.7C13.08 17.52 14.48 18.92 16.3 19.8L17.6 17.8L21 19.5V21.2C21 22.19 20.19 23 19.2 23C13.55 22.68 9.32 18.45 9 12.8Z" fill="white"/>

  <!-- Neural net: 3 nodes connected with lines (cyan, top-right area) -->
  <!-- Node connections (lines first, drawn under nodes) -->
  <line x1="20" y1="9" x2="25" y2="7" stroke="#22D3EE" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
  <line x1="20" y1="9" x2="25" y2="12" stroke="#22D3EE" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
  <line x1="25" y1="7" x2="25" y2="12" stroke="#22D3EE" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <!-- Connection from phone to neural net -->
  <line x1="17.5" y1="11" x2="20" y2="9" stroke="#22D3EE" stroke-width="1" stroke-linecap="round" opacity="0.5" stroke-dasharray="1.5 1.5"/>

  <!-- Neural net nodes (filled circles) -->
  <circle cx="20" cy="9" r="1.8" fill="#22D3EE"/>
  <circle cx="25" cy="7" r="1.5" fill="#22D3EE" opacity="0.9"/>
  <circle cx="25" cy="12" r="1.5" fill="#22D3EE" opacity="0.9"/>
</svg>
